name: newt_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - click>=8
  - numpy>=1.23
  - pandas>=2
  - scipy
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn
  - networkx>=3.0
  - tensorflow>=2.14
  - gensim
  - scanpy
  - leidenalg
  - python-igraph
  - igraph
  - libstdcxx-ng
  - pip
  - pip:
    - mygene
